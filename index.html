<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RepLog — Workout Tracker</title>
<style>
/* ============================================================
   FONTS & RESET
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Figtree:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ============================================================
   CSS VARIABLES — Industrial-Utilitarian Palette
   ============================================================ */
:root {
  --bg:         #f4f1ec;
  --surface:    #ffffff;
  --surface2:   #faf8f5;
  --border:     #e2ddd6;
  --border2:    #ccc7be;
  --text:       #1a1714;
  --text2:      #6b6560;
  --text3:      #9e9891;
  --accent:     #d4541a;
  --accent-lt:  #fde8dc;
  --accent2:    #1a5cd4;
  --accent2-lt: #dce8fd;
  --green:      #1a8c4e;
  --green-lt:   #d4f0e3;
  --yellow:     #c97b00;
  --yellow-lt:  #fef0cc;
  --red:        #c41a1a;
  --red-lt:     #fce8e8;
  --shadow:     0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:  0 2px 8px rgba(0,0,0,.09), 0 8px 32px rgba(0,0,0,.08);
  --radius:     10px;
  --radius-sm:  6px;
  --mono:       'DM Mono', monospace;
  --display:    'Syne', sans-serif;
  --body:       'Figtree', sans-serif;
}

/* ============================================================
   BASE
   ============================================================ */
html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ============================================================
   LAYOUT
   ============================================================ */
.app-wrapper {
  max-width: 980px;
  margin: 0 auto;
  padding: 0 16px 60px;
}

/* ============================================================
   HEADER
   ============================================================ */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 20px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

.logo {
  font-family: var(--display);
  font-size: 1.9rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }

.header-meta {
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--text3);
  text-align: right;
}
.header-meta strong { color: var(--text2); font-weight: 500; }

/* ============================================================
   TABS
   ============================================================ */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 24px;
  overflow-x: auto;
}

.tab-btn {
  flex: 1;
  min-width: 110px;
  padding: 9px 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  cursor: pointer;
  font-family: var(--body);
  font-size: .82rem;
  font-weight: 600;
  color: var(--text2);
  transition: all .18s ease;
  white-space: nowrap;
}
.tab-btn:hover { background: var(--surface2); color: var(--text); }
.tab-btn.active {
  background: var(--text);
  color: #fff;
}

/* ============================================================
   PANELS
   ============================================================ */
.panel { display: none; animation: fadeUp .25s ease; }
.panel.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.card-title {
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: .95rem;
  flex-shrink: 0;
}
.icon-orange { background: var(--accent-lt); }
.icon-blue   { background: var(--accent2-lt); }
.icon-green  { background: var(--green-lt); }

/* ============================================================
   FORM
   ============================================================ */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.field.wide { grid-column: 1 / -1; }

label {
  font-size: .75rem;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  font-family: var(--mono);
}

input[type="text"],
input[type="number"],
input[type="date"],
input[type="search"] {
  padding: 9px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-family: var(--body);
  font-size: .9rem;
  color: var(--text);
  background: var(--bg);
  transition: border-color .15s, box-shadow .15s;
  -moz-appearance: textfield;
  width: 100%;
}
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button { -webkit-appearance: none; }
input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-lt);
}
input.error { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-lt); }

.form-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--body);
  font-size: .875rem;
  font-weight: 600;
  transition: all .15s ease;
}
.btn:active { transform: scale(.97); }

.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #b8451a; }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
}
.btn-secondary:hover { background: var(--border); }

.btn-green {
  background: var(--green);
  color: #fff;
}
.btn-green:hover { background: #157040; }

.btn-danger {
  background: var(--red-lt);
  color: var(--red);
  border: 1px solid #f0bfbf;
}
.btn-danger:hover { background: #f8d5d5; }

.btn-sm {
  padding: 5px 10px;
  font-size: .78rem;
}

/* ============================================================
   FILTERS
   ============================================================ */
.filters-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filters-row .field { flex: 1; min-width: 160px; }
.filters-row .btn   { align-self: flex-end; }

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: .84rem;
}
thead th {
  background: var(--surface2);
  padding: 10px 12px;
  text-align: left;
  font-family: var(--mono);
  font-size: .7rem;
  font-weight: 500;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .4px;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
tbody td {
  padding: 9px 12px;
  color: var(--text);
  vertical-align: middle;
}
td.mono { font-family: var(--mono); font-size: .78rem; color: var(--text2); }
td.exname { font-weight: 600; }
td.num {
  font-family: var(--mono);
  font-size: .82rem;
  text-align: right;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: .7rem;
  font-weight: 500;
}
.badge-day { background: var(--yellow-lt); color: var(--yellow); }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text3);
}
.empty-state .big { font-size: 2.5rem; margin-bottom: 10px; }
.empty-state p { font-size: .9rem; }

/* ============================================================
   TOAST
   ============================================================ */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--text);
  color: #fff;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: .85rem;
  font-weight: 500;
  animation: toastIn .2s ease;
  max-width: 280px;
  box-shadow: var(--shadow-lg);
}
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 600px) {
  .app-header { padding: 18px 0 14px; }
  .logo { font-size: 1.5rem; }
  .tab-btn { font-size: .78rem; padding: 8px 10px; min-width: 85px; }
  .card { padding: 18px 16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .form-grid { grid-template-columns: 1fr 1fr; }
}
/* ============================================================
   BODY WEIGHT TAB
   ============================================================ */
.bw-form-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}

/* Sparkline chart */
.bw-chart {
  width: 100%;
  height: 140px;
  display: block;
}

.bw-summary-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.bw-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.bw-stat-label {
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .4px;
}
.bw-stat-value {
  font-family: var(--display);
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--text);
}
.bw-stat-value.up   { color: var(--accent); }
.bw-stat-value.down { color: var(--green); }

@media (max-width: 600px) {
  .bw-form-row { grid-template-columns: 1fr 1fr; }
}
/* ============================================================
   CSV IMPORT MODAL
   ============================================================ */
.import-overlay {
  position: fixed; inset: 0;
  background: rgba(26,23,20,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 10000;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.import-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 480px;
  width: calc(100% - 32px);
  box-shadow: var(--shadow-lg);
}
.import-modal h3 {
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.import-modal p {
  font-size: .82rem;
  color: var(--text2);
  margin-bottom: 16px;
  line-height: 1.5;
}
.import-modal code {
  font-family: var(--mono);
  font-size: .75rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 5px;
}
.import-dropzone {
  border: 2px dashed var(--border2);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  margin-bottom: 14px;
}
.import-dropzone:hover, .import-dropzone.dragover {
  border-color: var(--accent2);
  background: var(--accent2-lt);
}
.import-dropzone .drop-icon { font-size: 2rem; margin-bottom: 8px; }
.import-dropzone p { color: var(--text2); font-size: .85rem; margin-bottom: 0; }
.import-dropzone strong { color: var(--accent2); }
.import-result {
  font-family: var(--mono);
  font-size: .78rem;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
  display: none;
}
.import-result.ok    { background: var(--green-lt);  color: var(--green); }
.import-result.error { background: var(--red-lt);    color: var(--red); }
.import-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="app-wrapper">

  <!-- ========== HEADER ========== -->
  <header class="app-header">
    <div class="logo">Rep<span>Log</span></div>
    <div class="header-meta">
      <strong id="live-date">—</strong><br>
      Workout Tracker
    </div>
  </header>

  <!-- ========== TABS ========== -->
  <nav class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="log">➕ Log Workout</button>
    <button class="tab-btn" data-tab="history">📋 History</button>
    <button class="tab-btn" data-tab="bodyweight">⚖️ Body Weight</button>
  </nav>

  <!-- ============================================================
       PANEL: LOG WORKOUT
       ============================================================ -->
  <div class="panel active" id="panel-log">
    <div class="card">
      <div class="card-title">
        <span class="icon icon-orange">🏋️</span>
        New Workout Entry
      </div>

      <div class="form-grid">
        <div class="field wide">
          <label for="exercise-name">Exercise Name *</label>
          <input type="text" id="exercise-name" placeholder="e.g. Bench Press" autocomplete="off" />
        </div>
        <div class="field">
          <label for="exercise-num">Exercise Number *</label>
          <input type="number" id="exercise-num" placeholder="1" min="1" />
        </div>
        <div class="field">
          <label for="set-no">Set No. *</label>
          <input type="number" id="set-no" placeholder="1" min="1" />
        </div>
        <div class="field">
          <label for="reps">Reps *</label>
          <input type="number" id="reps" placeholder="10" min="0" />
        </div>
        <div class="field">
          <label for="weight">Weight (kg) *</label>
          <input type="number" id="weight" placeholder="60" min="0" step="0.5" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="btn-save">💾 Save Entry</button>
        <button class="btn btn-secondary" id="btn-clear-form">✕ Clear</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       PANEL: HISTORY
       ============================================================ -->
  <div class="panel" id="panel-history">
    <div class="card">
      <div class="card-title">
        <span class="icon icon-blue">🔍</span>
        Search & Filter
      </div>
      <div class="filters-row">
        <div class="field">
          <label for="search-name">Exercise Name</label>
          <input type="search" id="search-name" placeholder="Search…" />
        </div>
        <div class="field">
          <label for="filter-date">Filter by Date</label>
          <input type="date" id="filter-date" />
        </div>
        <button class="btn btn-secondary" id="btn-clear-filters">Clear Filters</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="icon icon-blue">📋</span>
          Workout Logs
        </span>
        <span style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm" id="btn-import">⬆️ Import CSV</button>
          <input type="file" id="import-csv-input" accept=".csv" style="display:none" />
          <button class="btn btn-green btn-sm" id="btn-export">⬇️ Export CSV</button>
          <button class="btn btn-danger btn-sm" id="btn-delete-all">🗑️ Delete All</button>
        </span>
      </div>

      <div id="logs-count" style="font-size:.8rem;color:var(--text3);margin-bottom:12px;font-family:var(--mono);"></div>

      <div class="table-wrap" id="table-container">
        <!-- table injected by JS -->
      </div>
    </div>
  </div>

  <!-- ============================================================
       PANEL: BODY WEIGHT
       ============================================================ -->
  <div class="panel" id="panel-bodyweight">

    <!-- Log today's weight -->
    <div class="card">
      <div class="card-title">
        <span class="icon icon-green">⚖️</span>
        Log Body Weight
      </div>
      <div class="bw-form-row">
        <div class="field">
          <label for="bw-date">Date</label>
          <input type="date" id="bw-date" />
        </div>
        <div class="field">
          <label for="bw-value">Weight (kg) *</label>
          <input type="number" id="bw-value" placeholder="e.g. 75.5" min="0" step="0.1" />
        </div>
        <div class="field">
          <label for="bw-note">Note (optional)</label>
          <input type="text" id="bw-note" placeholder="Morning, post-meal…" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btn-bw-save">💾 Save Weight</button>
        <button class="btn btn-secondary" id="btn-bw-clear">✕ Clear</button>
      </div>
    </div>

    <!-- Sparkline trend -->
    <div class="card">
      <div class="card-title">
        <span class="icon icon-blue">📈</span>
        Trend (last 30 entries)
      </div>
      <div id="bw-chart-wrap">
        <div class="empty-state"><div class="big">📉</div><p>Log at least 2 entries to see your trend.</p></div>
      </div>
    </div>

    <!-- History table -->
    <div class="card">
      <div class="card-title" style="justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="icon icon-green">📋</span>
          Weight Log
        </span>
        <span style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm" id="btn-bw-import">⬆️ Import CSV</button>
          <input type="file" id="bw-import-csv-input" accept=".csv" style="display:none" />
          <button class="btn btn-green btn-sm" id="btn-bw-export">⬇️ Export CSV</button>
          <button class="btn btn-danger btn-sm" id="btn-bw-delete-all">🗑️ Delete All</button>
        </span>
      </div>
      <div id="bw-logs-count" style="font-size:.8rem;color:var(--text3);margin-bottom:12px;font-family:var(--mono);"></div>
      <div class="table-wrap" id="bw-table-container"></div>
    </div>

  </div>

</div><!-- /app-wrapper -->

<!-- ========== TOAST CONTAINER ========== -->
<div id="toast-container"></div>

<!-- ============================================================
     JAVASCRIPT
     ============================================================ -->
<script>
/* ============================================================
   CONSTANTS & HELPERS
   ============================================================ */
const STORAGE_KEY = 'replog_entries_v1';
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/** Generate a simple unique ID */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

/** Pad number to 2 digits */
function pad(n) { return String(n).padStart(2, '0'); }

/** Format date as YYYY-MM-DD */
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

/** Format timestamp HH:MM:SS */
function nowTime() {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

/** Current day name */
function todayName() { return DAYS[new Date().getDay()]; }

/** Show a toast notification */
function toast(msg, type = 'default', dur = 2800) {
  const tc = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  tc.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

/* ============================================================
   DATA LAYER — localStorage
   ============================================================ */

/** Load all entries from localStorage */
function loadEntries() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.error('RepLog: failed to load entries', e);
    return [];
  }
}

/** Save all entries to localStorage */
function saveEntries(entries) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch (e) {
    console.error('RepLog: failed to save entries', e);
    toast('Storage error — data may not have saved.', 'error');
  }
}

/** Add a new entry */
function addEntry(data) {
  const entries = loadEntries();
  const entry = {
    id:           uid(),
    date:         todayISO(),
    day:          todayName(),
    timestamp:    nowTime(),
    exerciseName: data.exerciseName.trim(),
    exerciseNum:  Number(data.exerciseNum),
    setNo:        Number(data.setNo),
    reps:         Number(data.reps),
    weight:       Number(data.weight),
  };
  entries.unshift(entry); // newest first
  saveEntries(entries);
  return entry;
}

/** Delete a single entry by id */
function deleteEntry(id) {
  const entries = loadEntries().filter(e => e.id !== id);
  saveEntries(entries);
}

/** Delete all entries */
function deleteAllEntries() {
  saveEntries([]);
}

/* ============================================================
   TABS
   ============================================================ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'history') renderLogs();

}

const BW_KEY = 'replog_bodyweight_v1';

function loadBWEntries() {
  try {
    const raw = localStorage.getItem(BW_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function saveBWEntries(entries) {
  try {
    localStorage.setItem(BW_KEY, JSON.stringify(entries));
  } catch (e) {
    toast('Storage error — weight data may not have saved.', 'error');
  }
}

function addBWEntry(data) {
  const entries = loadBWEntries();
  const entry = {
    id:        uid(),
    date:      data.date,
    day:       DAYS[new Date(data.date + 'T12:00:00').getDay()],
    weight:    Number(data.weight),
    note:      data.note.trim(),
    timestamp: nowTime(),
  };
  // Remove existing entry for same date (one per day)
  const filtered = entries.filter(e => e.date !== data.date);
  filtered.unshift(entry);
  filtered.sort((a, b) => b.date.localeCompare(a.date)); // newest first
  saveBWEntries(filtered);
  return entry;
}

function deleteBWEntry(id) {
  saveBWEntries(loadBWEntries().filter(e => e.id !== id));
}

/* ============================================================
   BODY WEIGHT — CHART (SVG sparkline)
   ============================================================ */
function renderBWChart(entries) {
  const wrap = document.getElementById('bw-chart-wrap');
  // Need at least 2 points
  const pts = [...entries].sort((a, b) => a.date.localeCompare(b.date)).slice(-30);
  if (pts.length < 2) {
    wrap.innerHTML = '<div class="empty-state"><div class="big">📉</div><p>Log at least 2 entries to see your trend.</p></div>';
    return;
  }

  const W = 900, H = 140, PAD = { t: 14, b: 28, l: 48, r: 16 };
  const iW = W - PAD.l - PAD.r;
  const iH = H - PAD.t - PAD.b;

  const weights = pts.map(p => p.weight);
  const minW = Math.min(...weights);
  const maxW = Math.max(...weights);
  const rangeW = maxW - minW || 1;

  const xScale = i => PAD.l + (i / (pts.length - 1)) * iW;
  const yScale = w => PAD.t + iH - ((w - minW) / rangeW) * iH;

  // Build polyline points
  const linePoints = pts.map((p, i) => `${xScale(i)},${yScale(p.weight)}`).join(' ');

  // Area fill path
  const areaPath = `M${xScale(0)},${yScale(pts[0].weight)} ` +
    pts.map((p, i) => `L${xScale(i)},${yScale(p.weight)}`).join(' ') +
    ` L${xScale(pts.length-1)},${PAD.t+iH} L${xScale(0)},${PAD.t+iH} Z`;

  // Y-axis labels
  const yTicks = 3;
  const yLabels = Array.from({length: yTicks}, (_, i) => {
    const v = minW + (rangeW / (yTicks - 1)) * i;
    const y = yScale(v);
    return `<text x="${PAD.l - 6}" y="${y + 4}" text-anchor="end" font-size="10" fill="var(--text3)" font-family="var(--mono)">${v.toFixed(1)}</text>
            <line x1="${PAD.l}" y1="${y}" x2="${PAD.l + iW}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
  }).join('');

  // X-axis date labels (show up to 6 evenly spaced)
  const xStep = Math.ceil(pts.length / 6);
  const xLabels = pts
    .filter((_, i) => i % xStep === 0 || i === pts.length - 1)
    .map((p, _, arr) => {
      const origIdx = pts.indexOf(p);
      const x = xScale(origIdx);
      const short = p.date.slice(5); // MM-DD
      return `<text x="${x}" y="${H - 4}" text-anchor="middle" font-size="10" fill="var(--text3)" font-family="var(--mono)">${short}</text>`;
    }).join('');

  // Dot for last point
  const lastX = xScale(pts.length - 1);
  const lastY = yScale(pts[pts.length - 1].weight);

  // Summary stats
  const first = pts[0].weight;
  const last  = pts[pts.length - 1].weight;
  const diff  = last - first;
  const diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(1) + ' kg';
  const diffClass = diff > 0 ? 'up' : diff < 0 ? 'down' : '';

  wrap.innerHTML = `
    <svg class="bw-chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <defs>
        <linearGradient id="bwGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--accent2)" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="var(--accent2)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${yLabels}
      <path d="${areaPath}" fill="url(#bwGrad)"/>
      <polyline points="${linePoints}" fill="none" stroke="var(--accent2)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lastX}" cy="${lastY}" r="5" fill="var(--accent2)" stroke="white" stroke-width="2"/>
      ${xLabels}
    </svg>
    <div class="bw-summary-row">
      <div class="bw-stat">
        <span class="bw-stat-label">Current</span>
        <span class="bw-stat-value">${last.toFixed(1)} kg</span>
      </div>
      <div class="bw-stat">
        <span class="bw-stat-label">Starting</span>
        <span class="bw-stat-value">${first.toFixed(1)} kg</span>
      </div>
      <div class="bw-stat">
        <span class="bw-stat-label">Change</span>
        <span class="bw-stat-value ${diffClass}">${diffStr}</span>
      </div>
      <div class="bw-stat">
        <span class="bw-stat-label">Entries</span>
        <span class="bw-stat-value">${pts.length}</span>
      </div>
      <div class="bw-stat">
        <span class="bw-stat-label">Lowest</span>
        <span class="bw-stat-value down">${minW.toFixed(1)} kg</span>
      </div>
      <div class="bw-stat">
        <span class="bw-stat-label">Highest</span>
        <span class="bw-stat-value up">${maxW.toFixed(1)} kg</span>
      </div>
    </div>`;
}

/** Parse a raw CSV string into an array of header-keyed objects */
function parseCSV(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split('\n');
  if (lines.length < 2) return [];

  // Parse a single CSV line respecting quoted fields
  function parseLine(line) {
    const out = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        out.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    out.push(cur.trim());
    return out;
  }

  const headers = parseLine(lines[0]).map(h => h.toLowerCase().replace(/[^a-z0-9]/g, ''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = vals[idx] !== undefined ? vals[idx] : ''; });
    rows.push(obj);
  }
  return rows;
}

/** Show the import modal. onFile(file) called when user picks/drops a file. Returns close fn. */
function showImportModal({ title, hint, onFile }) {
  const overlay = document.createElement('div');
  overlay.className = 'import-overlay';
  overlay.innerHTML = `
    <div class="import-modal">
      <h3>⬆️ ${title}</h3>
      <p>${hint}</p>
      <div class="import-dropzone" id="im-dropzone">
        <div class="drop-icon">📂</div>
        <p>Drop your CSV file here, or <strong>click to browse</strong></p>
      </div>
      <div class="import-result" id="im-result"></div>
      <div class="import-modal-actions">
        <button class="btn btn-secondary" id="im-close">Close</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const dropzone  = overlay.querySelector('#im-dropzone');
  const resultEl  = overlay.querySelector('#im-result');
  const closeBtn  = overlay.querySelector('#im-close');

  function showResult(msg, ok) {
    resultEl.textContent = msg;
    resultEl.className = 'import-result ' + (ok ? 'ok' : 'error');
    resultEl.style.display = 'block';
  }

  function handleFile(file) {
    if (!file || !file.name.endsWith('.csv')) {
      showResult('❌ Please select a valid .csv file.', false); return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const msg = onFile(e.target.result);
      showResult(msg.text, msg.ok);
    };
    reader.readAsText(file);
  }

  // Click to browse via hidden input
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = '.csv'; fi.style.display = 'none';
  document.body.appendChild(fi);
  dropzone.addEventListener('click', () => fi.click());
  fi.addEventListener('change', () => { if (fi.files[0]) handleFile(fi.files[0]); fi.value = ''; });

  // Drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
  });

  // Close
  function close() { overlay.remove(); fi.remove(); }
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  return close;
}

/* ============================================================
   CSV IMPORT — WORKOUT LOGS
   Expected columns (case-insensitive, order flexible):
   Date, Day, Exercise Number, Exercise Name, Set No., Reps, Weight, Timestamp
   ============================================================ */
document.getElementById('btn-import').addEventListener('click', () => {
  showImportModal({
    title: 'Import Workout Logs',
    hint:  `CSV must include columns: <code>Date</code>, <code>Exercise Name</code>, <code>Exercise Number</code>, <code>Set No.</code>, <code>Reps</code>, <code>Weight</code>. Extra columns are ignored. Duplicate entries are added as new rows.`,
    onFile(text) {
      const rows = parseCSV(text);
      if (!rows.length) return { text: '❌ File appears empty or unreadable.', ok: false };

      // Flexible header mapping
      const MAP = {
        date:         ['date'],
        exerciseName: ['exercisename','exercise name','exercise'],
        exerciseNum:  ['exercisenumber','exercise number','exercisenum','#'],
        setNo:        ['setno','set no','set no.','set','setnumber'],
        reps:         ['reps','repetitions'],
        weight:       ['weight','weight kg','weightkg'],
        timestamp:    ['timestamp','time'],
        day:          ['day'],
      };

      function pick(row, keys) {
        for (const k of keys) { if (row[k] !== undefined) return row[k]; }
        return '';
      }

      const existing = loadEntries();
      const imported = [];
      const errors   = [];

      rows.forEach((row, i) => {
        const date = pick(row, MAP.date);
        const name = pick(row, MAP.exerciseName);
        const exNum = pick(row, MAP.exerciseNum);
        const setNo = pick(row, MAP.setNo);
        const reps  = pick(row, MAP.reps);
        const weight = pick(row, MAP.weight);

        if (!date || !name) {
          errors.push(`Row ${i+2}: missing Date or Exercise Name`); return;
        }
        if (isNaN(parseFloat(weight)) || isNaN(parseInt(reps))) {
          errors.push(`Row ${i+2}: invalid Reps or Weight`); return;
        }

        imported.push({
          id:           uid(),
          date:         date.trim(),
          day:          pick(row, MAP.day) || DAYS[new Date(date.trim()+'T12:00:00').getDay()] || '',
          timestamp:    pick(row, MAP.timestamp) || nowTime(),
          exerciseName: name.trim(),
          exerciseNum:  Number(exNum) || 1,
          setNo:        Number(setNo) || 1,
          reps:         Number(reps),
          weight:       parseFloat(weight),
        });
      });

      if (!imported.length) {
        return { text: `❌ No valid rows found. ${errors[0] || ''}`, ok: false };
      }

      // Merge: prepend imported, sort newest first
      const merged = [...imported, ...existing].sort((a,b) => b.date.localeCompare(a.date));
      saveEntries(merged);
      renderLogs();

      const warn = errors.length ? ` (${errors.length} row${errors.length>1?'s':''} skipped)` : '';
      return { text: `✅ Imported ${imported.length} entr${imported.length===1?'y':'ies'}${warn}.`, ok: true };
    }
  });
});

        date:   ['date'],
        weight: ['weight','weightkg','weight kg','weightkg'],
        note:   ['note','notes'],
      };
      function pick(row, keys) {
        for (const k of keys) { if (row[k] !== undefined) return row[k]; }
        return '';
      }

      const existing = loadBWEntries();
      const imported = [];
      const errors   = [];

      rows.forEach((row, i) => {
        const date   = pick(row, MAP.date).trim();
        const weight = pick(row, MAP.weight);
        const note   = pick(row, MAP.note);

        if (!date) { errors.push(`Row ${i+2}: missing Date`); return; }
        const wNum = parseFloat(weight);
        if (isNaN(wNum) || wNum <= 0) { errors.push(`Row ${i+2}: invalid Weight`); return; }

        imported.push({
          id:        uid(),
          date,
          day:       DAYS[new Date(date+'T12:00:00').getDay()] || '',
          weight:    wNum,
          note:      note.trim(),
          timestamp: nowTime(),
        });
      });

      if (!imported.length) {
        return { text: `❌ No valid rows found. ${errors[0] || ''}`, ok: false };
      }

      // Merge: imported overwrites same-date existing entries
      const existingFiltered = existing.filter(e => !imported.find(i => i.date === e.date));
      const merged = [...imported, ...existingFiltered].sort((a,b) => b.date.localeCompare(a.date));
      saveBWEntries(merged);
      renderBWLogs();

      const warn = errors.length ? ` (${errors.length} row${errors.length>1?'s':''} skipped)` : '';
      return { text: `✅ Imported ${imported.length} entr${imported.length===1?'y':'ies'}${warn}.`, ok: true };
    }
  });
});
</script>
</body>
</html>
